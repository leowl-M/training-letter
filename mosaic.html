<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosaico Artwork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { neutral: { 950: '#0a0a0a' } } } }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }

    :root {
      --gap: 8px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--tile-w));
      gap: var(--gap);
    }

    .tile {
      width: var(--tile-w);
      height: var(--tile-h);
      overflow: hidden;
      background: #111;
      transform: scale(0);
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes pop-in {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="grid"></div>

  <script>
    const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://your-backend.onrender.com';

    const REFRESH_INTERVAL = 10000; // ms

    let knownUrls = new Set();

    const RATIO = 4 / 3;
    const GAP = 8;

    function computeLayout(total) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let bestCols = total;
      for (let cols = 1; cols <= total; cols++) {
        const rows = Math.ceil(total / cols);
        const tileW = (vw - GAP * (cols + 1)) / cols;
        const tileH = tileW / RATIO;
        const totalH = tileH * rows + GAP * (rows + 1);
        if (totalH <= vh) {
          bestCols = cols;
          break;
        }
      }

      const rows = Math.ceil(total / bestCols);
      const tileW = (vw - GAP * (bestCols + 1)) / bestCols;
      const tileH = tileW / RATIO;
      return { cols: bestCols, tileW: Math.floor(tileW), tileH: Math.floor(tileH) };
    }

    function addTile(url) {
      const grid = document.getElementById('grid');
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.url = url;

      const img = document.createElement('img');
      img.src = url;
      img.alt = 'artwork';
      img.loading = 'lazy';
      img.onerror = () => console.error('Immagine non caricata:', url);

      tile.appendChild(img);
      grid.appendChild(tile);
    }

    function applyLayout() {
      const grid = document.getElementById('grid');
      const total = knownUrls.size;
      if (total === 0) return;
      const { cols, tileW, tileH } = computeLayout(total);
      grid.style.setProperty('--cols', cols);
      grid.style.setProperty('--tile-w', tileW + 'px');
      grid.style.setProperty('--tile-h', tileH + 'px');
    }

    function updateGrid(urls) {
      const newUrls = urls.filter(u => !knownUrls.has(u));
      newUrls.forEach(url => {
        knownUrls.add(url);
        addTile(url);
      });
      if (newUrls.length > 0) applyLayout();
    }

    window.addEventListener('resize', applyLayout);

    async function fetchArtworks() {
      try {
        const res  = await fetch(`${BACKEND_URL}/artworks`);
        const data = await res.json();
        if (!res.ok || !data.urls) return;
        updateGrid(data.urls);
      } catch (err) {
        console.error('Fetch error:', err.message);
      }
    }

    fetchArtworks();
    setInterval(fetchArtworks, REFRESH_INTERVAL);
  </script>

</body>
</html>
